services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" 

  web:
    build: .
    command: >
      bash -c "
        rm -f tmp/pids/server.pid &&
        bundle exec rails db:create db:migrate 2>/dev/null || true &&
        bundle exec rails server -b 0.0.0.0
      "
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/testtaskuchidotru_development
      RAILS_ENV: development
      SECRET_SALT: dev_secret_change_me  
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle  

volumes:
  postgres_data:
  bundle_cache: